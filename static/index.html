<!DOCTYPE html>
<html>
   <head>
      <meta name="viewport" content="width=device-width, initial-scale=1">
      <script src="https://code.jquery.com/jquery-1.10.2.js"></script>
      <link rel="stylesheet" href="index.css">
      <script type="text/javascript" src="//counter.websiteout.net/js/7/10/5/0"></script>
      <link rel="shortcut icon" type="image/jpg" href="~/favicon.ico"/>
      <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" integrity="sha512-iecdLmaskl7CVkqkXNQ/ZH/XLlvWZOJyj7Yy7tcenmpD1ypASozpmFIB46ZmdtAc9eNBvH0H/ZpiBw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
      <link href="https://fonts.googleapis.com/css2?family=Open+Sans&display=swap" rel="stylesheet">
      <link href="https://fonts.googleapis.com/css2?family=Oswald&display=swap" rel="stylesheet">
      <style>
         .button-container {
            margin-top: 20px;
            display: flex;
            justify-content: center;
            gap: 20px;
         }
         .button-group {
            display: flex;
            flex-direction: column;
            align-items: center;
         }
         .proxy-button {
            background: none;
            border: none;
            cursor: pointer;
         }
         .proxy-button img {
            width: 30px;
            height: 30px;
         }
         .button-label {
            font-family: 'Open Sans', sans-serif;
            font-size: 12px;
            margin-top: 5px;
            text-align: center;
         }
         .settings-panel {
            display: none;
            position: absolute;
            top: 50px;
            right: 20px;
            background: white;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 5px;
            box-shadow: 0px 2px 10px rgba(0, 0, 0, 0.2);
         }
         .settings-panel label, .settings-panel select {
            font-family: 'Open Sans', sans-serif;
            margin-bottom: 10px;
         }
      </style>
   </head>
   <body>
      <div id="header"></div>
      <div id="content">
         <h1>Waffle Proxy!🧇</h1>

         <form id="uv-form">
            <input id="uv-search-engine" value="google.com/search" type="hidden"/> 
            <input id="uv-address" type="text" placeholder="Search With Waffle Proxy" class="form__input"/>
         </form>

         <!-- Buttons Side by Side -->
         <div class="button-container">
            <div class="button-group">
               <button class="proxy-button" onclick="openDuckDuckGoInProxy()">
                  <img src="https://www.duckduckgo.com/favicon.ico" alt="DuckDuckGo">
               </button>
               <div class="button-label">DuckDuckGo</div>
            </div>
            <div class="button-group">
               <button class="proxy-button" onclick="openTikTokInProxy()">
                  <img src="https://www.tiktok.com/favicon.ico" alt="TikTok">
               </button>
               <div class="button-label">TikTok</div>
            </div>
            <button class="proxy-button" onclick="toggleSettingsPanel()">
               <img src="https://cdn-icons-png.flaticon.com/512/2099/2099058.png" alt="Settings" style="width: 30px; height: 30px;">
            </button>
         </div>

         <!-- Settings Panel -->
         <div id="settings-panel" class="settings-panel">
            <label for="theme-select">Choose Theme:</label>
            <select id="theme-select" onchange="changeTheme(this.value)">
               <option value="light">Light</option>
               <option value="dark">Dark</option>
               <option value="custom">Custom</option>
            </select>
         </div>

         <div class="desc left-margin">
            <p id="uv-error"></p>
            <pre id="uv-error-code"></pre>
         </div>

         <a></a> <!-- Fixed invalid <a> elements -->
      </div>

      <script src="uv/uv.bundle.js" defer></script>
      <script src="uv/uv.config.js" defer></script>
      <script src="register-sw.js" defer></script>
      <script src="search.js" defer></script>
      <script src="index.js" defer></script>
      <script src="error.js" defer></script>
      <script>
         function openDuckDuckGoInProxy() {
            const duckDuckGoURL = '/static/tiw/hvtrs8%2F-dwcidwcigm.aoo%2F'; // DuckDuckGo static link
            window.location.href = duckDuckGoURL; // Open DuckDuckGo with the new static path
         }

         function openTikTokInProxy() {
            const tiktokURL = '/static/tiw/hvtrs8%2F-wuw%2Ctkkvoi.aoo%2Fgxrlmrg'; // TikTok static link
            window.location.href = tiktokURL; // Open TikTok with the new static path
         }

         function toggleSettingsPanel() {
            const panel = document.getElementById('settings-panel');
            panel.style.display = panel.style.display === 'none' || panel.style.display === '' ? 'block' : 'none';
         }

         function changeTheme(theme) {
            switch (theme) {
               case 'light':
                  document.body.style.background = 'white';
                  document.body.style.color = 'black';
                  break;
               case 'dark':
                  document.body.style.background = 'black';
                  document.body.style.color = 'white';
                  break;
               case 'custom':
                  document.body.style.background = '#f4e2d8';
                  document.body.style.color = '#4a4a4a';
                  break;
               default:
                  break;
            }
         }
      </script>
   </body>
</html>
