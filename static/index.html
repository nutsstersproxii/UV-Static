<!DOCTYPE html>
<html>
   <head>
      <meta name="viewport" content="width=device-width, initial-scale=1">
      <script src="https://code.jquery.com/jquery-1.10.2.js"></script>
      <link rel="stylesheet" href="index.css">
      <script type="text/javascript" src="//counter.websiteout.net/js/7/10/5/0"></script>
      <link rel="shortcut icon" type="image/jpg" href="~/favicon.ico"/>
      <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" integrity="sha512-iecdLmaskl7CVkqkXNQ/ZH/XLlvWZOJyj7YtcenmpD1ypASozpmFIB46ZmdtAc9eNBvH0H/ZpiBw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
      <link href="https://fonts.googleapis.com/css2?family=Open+Sans&display=swap" rel="stylesheet">
      <link href="https://fonts.googleapis.com/css2?family=Oswald&display=swap" rel="stylesheet">
      <style>
         .button-container {
            margin-top: 20px;
            display: flex;
            justify-content: center;
            gap: 20px;
         }
         .button-group {
            display: flex;
            flex-direction: column;
            align-items: center;
         }
         .proxy-button {
            background: none;
            border: none;
            cursor: pointer;
            padding: 0;
         }
         .proxy-button img {
            width: 30px;
            height: 30px;
            border: none;
         }
         .button-label {
            font-family: 'Open Sans', sans-serif;
            font-size: 12px;
            margin-top: 5px;
            text-align: center;
         }
         #footer {
            background: linear-gradient(to right, #e8a75d, #d89050);
            color: #5a2d0c;
            padding: 20px;
            text-align: center;
            border-top: 4px solid #c7753a;
            width: 100%;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
         }
      </style>
   </head>
   <body>
      <div id="header"></div>
      <div id="content">
         <h1>Waffle Proxy!🧇</h1>

         <form id="uv-form" onsubmit="event.preventDefault(); handleSearch();">
            <input id="uv-search-engine" value="https://www.google.com/search?q=" type="hidden"/> 
            <input id="uv-address" type="text" placeholder="Search With Waffle Proxy" class="form__input"/>
         </form>

         <div class="button-container">
            <div class="button-group">
               <button class="proxy-button" onclick="openDuckDuckGoInProxy()">
                  <img src="https://www.duckduckgo.com/favicon.ico" alt="DuckDuckGo">
               </button>
               <div class="button-label">DuckDuckGo</div>
            </div>
            <div class="button-group">
               <button class="proxy-button" onclick="openTikTokInProxy()">
                  <img src="https://www.tiktok.com/favicon.ico" alt="TikTok">
               </button>
               <div class="button-label">TikTok</div>
            </div>
            <div class="button-group">
               <button class="proxy-button" onclick="openTwitchInProxy()">
                  <img src="https://www.twitch.tv/favicon.ico" alt="Twitch">
               </button>
               <div class="button-label">Twitch</div>
            </div>
         </div>

         <div class="desc left-margin">
            <p id="uv-error"></p>
            <pre id="uv-error-code"></pre>
         </div>

         <a></a>
      </div>

      <div id="footer" onclick="changeFooterMessage()"></div>

      <script>
         const phrases = [
            "Made with ❤️ for waffle lovers!",
            "School Chromebooks are so bad.",
            "This proxy runs smoother than my grades.",
            "Waffles > Pancakes. Don't @ me.",
            "The WiFi is so slow, I can hear dial-up sounds.",
            "Why do school blocks make no sense?",
            "404: Homework Not Found.",
            "Teacher: 'No phones in class.' Also Teacher: *On their laptop*",
            "Using this proxy? Stay sneaky. 🕵️",
            "If this stops working, blame the IT guy."
         ];

         function changeFooterMessage() {
            const randomIndex = Math.floor(Math.random() * phrases.length);
            document.getElementById("footer").textContent = phrases[randomIndex];
         }

         window.onload = changeFooterMessage;

         function handleSearch() {
            const query = document.getElementById("uv-address").value;
            if (query.trim() !== "") {
               window.location.href = document.getElementById("uv-search-engine").value + encodeURIComponent(query);
            }
         }
      </script>
   </body>
</html>
