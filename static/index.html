<!DOCTYPE html>
<html>
   <head>
      <meta name="viewport" content="width=device-width, initial-scale=1">
      <script src="https://code.jquery.com/jquery-1.10.2.js"></script>
      <link rel="stylesheet" href="index.css">
      <script type="text/javascript" src="//counter.websiteout.net/js/7/10/5/0"></script>
      <link rel="shortcut icon" type="image/jpg" href="~/favicon.ico"/>
      <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" integrity="sha512-iecdLmaskl7CVkqkXNQ/ZH/XLlvWZOJyj7Yy7tcenmpD1ypASozpmFIB46ZmdtAc9eNBvH0H/ZpiBw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
      <link href="https://fonts.googleapis.com/css2?family=Open+Sans&display=swap" rel="stylesheet">
      <link href="https://fonts.googleapis.com/css2?family=Oswald&display=swap" rel="stylesheet">
   </head>
   <body>
      <div id="header"></div>
      <div id="content">
         <h1>Waffle Proxy!🧇</h1>

         <form id="uv-form">
            <input id="uv-search-engine" value="google.com/search" type="hidden"/> 
            <input id="uv-address" type="text" placeholder="Search With Waffle Proxy" class="form__input"/>
         </form>

         <!-- Buttons -->
         <div style="margin-top: 20px;">
            <button onclick="autoFillAndSubmit('https://www.tiktok.com')">
               <img src="https://www.tiktok.com/favicon.ico" alt="TikTok" style="width:20px; height:20px; margin-right: 5px;"> TikTok
            </button>
            <button onclick="autoFillAndSubmit('https://now.gg')">
               <img src="https://now.gg/favicon.ico" alt="Now.gg" style="width:20px; height:20px; margin-right: 5px;"> Now.gg
            </button>
            <button onclick="autoFillAndSubmit('https://discord.com')">
               <img src="https://discord.com/favicon.ico" alt="Discord" style="width:20px; height:20px; margin-right: 5px;"> Discord
            </button>
         </div>

         <div class="desc left-margin">
            <p id="uv-error"></p>
            <pre id="uv-error-code"></pre>
         </div>

         <a></a> <!-- Fixed invalid <a> elements -->
      </div>

      <script src="uv/uv.bundle.js" defer></script>
      <script src="uv/uv.config.js" defer></script>
      <script src="register-sw.js" defer></script>
      <script src="search.js" defer></script>
      <script src="index.js" defer></script>
      <script src="error.js" defer></script>

      <script>
         function autoFillAndSubmit(url) {
            document.getElementById('uv-address').value = url; // Autofill the URL into the input field
            document.getElementById('uv-form').submit(); // Automatically submit the form
         }
      </script>
   </body>
</html>
