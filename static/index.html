<!DOCTYPE html>
<html>
   <head>
      <meta name="viewport" content="width=device-width, initial-scale=1">
      <script src="https://code.jquery.com/jquery-1.10.2.js"></script>
      <link rel="stylesheet" href="index.css">
      <script type="text/javascript" src="//counter.websiteout.net/js/7/10/5/0"></script>
      <link rel="shortcut icon" type="image/jpg" href="~/favicon.ico"/>
      <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" integrity="sha512-iecdLmaskl7CVkqkXNQ/ZH/XLlvWZOJyj7YtcenmpD1ypASozpmFIB46ZmdtAc9eNBvH0H/ZpiBw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
      <link href="https://fonts.googleapis.com/css2?family=Open+Sans&display=swap" rel="stylesheet">
      <link href="https://fonts.googleapis.com/css2?family=Oswald&display=swap" rel="stylesheet">
      <style>
         .button-container {
            margin-top: 20px;
            display: flex;
            justify-content: center;
            gap: 20px;
         }
         .button-group {
            display: flex;
            flex-direction: column;
            align-items: center;
         }
         .proxy-button {
            background: none;
            border: none;
            cursor: pointer;
            padding: 0; /* Remove any padding for a clean look */
         }
         .proxy-button img {
            width: 30px;
            height: 30px;
            border: none; /* Remove any border */
         }
         .button-label {
            font-family: 'Open Sans', sans-serif;
            font-size: 12px;
            margin-top: 5px;
            text-align: center;
         }
         .add-link-container {
            margin-top: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
         }
         .add-link-input {
            width: 80%;
            padding: 5px;
            border: 1px solid #ccc;
            border-radius: 5px;
            font-family: 'Open Sans', sans-serif;
         }
         .add-link-button {
            padding: 5px 10px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            background: #4CAF50;
            color: white;
            font-family: 'Open Sans', sans-serif;
         }
         .add-link-button:hover {
            background: #45a049;
         }
         .custom-links-list {
            margin-top: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
         }
         .custom-link-item {
            display: flex;
            align-items: center;
            gap: 5px;
         }
         .custom-link-item a {
            color: #4CAF50;
            text-decoration: none;
            font-family: 'Open Sans', sans-serif;
         }
         .custom-link-item a:hover {
            text-decoration: underline;
         }
         .delete-link-button {
            border: none;
            background: red;
            color: white;
            border-radius: 3px;
            cursor: pointer;
            padding: 2px 5px;
         }
      </style>
   </head>
   <body>
      <div id="header"></div>
      <div id="content">
         <h1>Waffle Proxy!🧇</h1>

         <form id="uv-form">
            <input id="uv-search-engine" value="google.com/search" type="hidden"/> 
            <input id="uv-address" type="text" placeholder="Search With Waffle Proxy" class="form__input"/>
         </form>

         <!-- Buttons Side by Side -->
         <div class="button-container">
            <div class="button-group">
               <button class="proxy-button" onclick="openDuckDuckGoInProxy()">
                  <img src="https://www.duckduckgo.com/favicon.ico" alt="DuckDuckGo">
               </button>
               <div class="button-label">DuckDuckGo</div>
            </div>
            <div class="button-group">
               <button class="proxy-button" onclick="openTikTokInProxy()">
                  <img src="https://www.tiktok.com/favicon.ico" alt="TikTok">
               </button>
               <div class="button-label">TikTok</div>
            </div>
            <div class="button-group">
               <button class="proxy-button" onclick="openTwitchInProxy()">
                  <img src="https://www.twitch.tv/favicon.ico" alt="Twitch">
               </button>
               <div class="button-label">Twitch</div>
            </div>
         </div>

         <!-- Add Your Own Link -->
         <div class="add-link-container">
            <input type="text" id="custom-link" placeholder="Enter your link here" class="add-link-input">
            <button class="add-link-button" onclick="addCustomLink()">Add Link</button>
         </div>

         <!-- Custom Links List -->
         <div id="custom-links-list" class="custom-links-list"></div>

         <div class="desc left-margin">
            <p id="uv-error"></p>
            <pre id="uv-error-code"></pre>
         </div>

         <a></a> <!-- Fixed invalid <a> elements -->
      </div>

      <script src="uv/uv.bundle.js" defer></script>
      <script src="uv/uv.config.js" defer></script>
      <script src="register-sw.js" defer></script>
      <script src="search.js" defer></script>
      <script src="index.js" defer></script>
      <script src="error.js" defer></script>
      <script>
         function openDuckDuckGoInProxy() {
            const duckDuckGoURL = '/static/tiw/hvtrs8%2F-dwcidwcigm.aoo%2F'; // DuckDuckGo static link
            window.location.href = duckDuckGoURL; // Open DuckDuckGo with the new static path
         }

         function openTikTokInProxy() {
            const tiktokURL = '/static/tiw/hvtrs8%2F-wuw%2Ctkkvoi.aoo%2Fgxrlmrg'; // TikTok static link
            window.location.href = tiktokURL; // Open TikTok with the new static path
         }

         function openTwitchInProxy() {
            const twitchURL = '/static/tiw/hvtrs8%2F-wuw%2Ctuivcj.vv-'; // Twitch static link
            window.location.href = twitchURL; // Open Twitch with the new static path
         }

         function loadCustomLinks() {
            const savedLinks = JSON.parse(localStorage.getItem('customLinks')) || [];
            const customLinksList = document.getElementById('custom-links-list');
            customLinksList.innerHTML = ''; // Clear the list before rendering
            savedLinks.forEach(link => {
               const linkItem = document.createElement('div');
               linkItem.className = 'custom-link-item';
               linkItem.innerHTML = `
                  <a href="/static/${encodeURIComponent(link)}" target="_blank">${link}</a>
                  <button class="delete-link-button" onclick="deleteCustomLink('${link}')">X</button>
               `;
               customLinksList.appendChild(linkItem);
            });
         }

         function addCustomLink() {
            const customLink = document.getElementById('custom-link').value.trim();
            if (customLink) {
               const savedLinks = JSON.parse(localStorage.getItem('customLinks')) || [];
               savedLinks.push(customLink);
               localStorage.setItem('customLinks', JSON.stringify(savedLinks));
               document.getElementById('custom-link').value = ''; // Clear the input field
               loadCustomLinks(); // Reload the list
            } else {
               alert('Please enter a valid link.');
            }
         }

         function deleteCustomLink(link) {
            let savedLinks = JSON.parse(localStorage.getItem('customLinks')) || [];
            savedLinks = savedLinks.filter(savedLink => savedLink !== link);
            localStorage.setItem('customLinks', JSON.stringify(savedLinks));
            loadCustomLinks(); // Reload the list
         }

         // Load custom links on page load
         window.onload = loadCustomLinks;
      </script>
   </body>
</html>
