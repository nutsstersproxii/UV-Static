<!DOCTYPE html>
<html>
   <head>
      <meta name="viewport" content="width=device-width, initial-scale=1">
      <title>Theme Changer</title>
      <style>
         body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
         }

         #theme-changer {
            position: fixed;
            top: 10px;
            left: 10px;
            background: #f3f3f3;
            border: 1px solid #ccc;
            padding: 10px;
            z-index: 100;
            width: 200px;
         }

         .slider-container {
            margin-bottom: 10px;
         }

         .slider-container label {
            display: block;
            font-size: 14px;
            margin-bottom: 5px;
         }

         .slider-container input {
            width: 100%;
         }
      </style>
   </head>
   <body>
      <div id="theme-changer">
         <h3>Theme Customizer</h3>
         <div class="slider-container">
            <label for="bg-color">Background Color</label>
            <input type="color" id="bg-color" value="#f5d6a4">
         </div>
         <div class="slider-container">
            <label for="text-color">Text Color</label>
            <input type="color" id="text-color" value="#4a2c12">
         </div>
         <div class="slider-container">
            <label for="border-color">Border Color</label>
            <input type="color" id="border-color" value="#f3c798">
         </div>
         <div class="slider-container">
            <label for="font-size">Font Size</label>
            <input type="range" id="font-size" min="12" max="48" value="16">
         </div>
         <button id="apply-theme">Apply Theme</button>
      </div>

      <div id="content">
         <h1>Customizable Theme Example 🧇</h1>
         <p>Use the sliders to customize the theme dynamically.</p>
      </div>

      <script>
         // Theme customizer logic
         const bgColorInput = document.getElementById('bg-color');
         const textColorInput = document.getElementById('text-color');
         const borderColorInput = document.getElementById('border-color');
         const fontSizeInput = document.getElementById('font-size');
         const applyButton = document.getElementById('apply-theme');
         const content = document.getElementById('content');

         applyButton.addEventListener('click', () => {
            // Apply theme changes
            document.body.style.backgroundColor = bgColorInput.value;
            content.style.color = textColorInput.value;
            content.style.border = `2px solid ${borderColorInput.value}`;
            content.style.fontSize = `${fontSizeInput.value}px`;
         });
      </script>
   </body>
</html>
