<!DOCTYPE html>
<html>
   <head>
      <meta name="viewport" content="width=device-width, initial-scale=1">
      <title>Waffle Proxy - Functional Search</title>
      <script src="https://code.jquery.com/jquery-1.10.2.js"></script>
      <link rel="stylesheet" href="index.css">
      <style>
         #search-engine-selector {
            margin-top: 10px;
         }
         label {
            font-size: 14px;
            font-weight: bold;
            margin-right: 10px;
         }
         select {
            padding: 5px;
            font-size: 14px;
         }
      </style>
   </head>
   <body>
      <div id="content">
         <h1>Waffle Proxy! 🧇</h1>

         <form id="uv-form">
            <input id="uv-address" type="text" placeholder="Search With Waffle Proxy" class="form__input"/>
            <div id="search-engine-selector">
               <label for="search-engine">Choose your search engine:</label>
               <select id="search-engine">
                  <option value="google">Google</option>
                  <option value="bing">Microsoft Bing</option>
                  <option value="duckduckgo">DuckDuckGo</option>
               </select>
            </div>
            <button type="submit">Search</button>
         </form>
      </div>

      <script>
         document.getElementById('uv-form').addEventListener('submit', function(event) {
            event.preventDefault();

            const searchInput = document.getElementById('uv-address').value.trim();
            const selectedSearchEngine = document.getElementById('search-engine').value;
            const proxyBase = "/static/"; // Base proxy path

            let encodedURL;
            if (isValidURL(searchInput)) {
               // If it's a valid URL, encode it for the proxy
               encodedURL = encodeURIComponent(searchInput);
               window.location.href = `${proxyBase}${encodedURL}`;
            } else {
               // Handle search query based on the selected search engine
               let searchEngineURL;
               if (selectedSearchEngine === "google") {
                  searchEngineURL = `https://www.google.com/search?q=${encodeURIComponent(searchInput)}`;
               } else if (selectedSearchEngine === "bing") {
                  searchEngineURL = `https://www.bing.com/search?q=${encodeURIComponent(searchInput)}`;
               } else if (selectedSearchEngine === "duckduckgo") {
                  searchEngineURL = `https://duckduckgo.com/?q=${encodeURIComponent(searchInput)}`;
               }
               encodedURL = encodeURIComponent(searchEngineURL);
               window.location.href = `${proxyBase}${encodedURL}`;
            }
         });

         function isValidURL(string) {
            try {
               const url = new URL(string);
               return url.protocol === "http:" || url.protocol === "https:";
            } catch (_) {
               return false;
            }
         }
      </script>
   </body>
</html>
