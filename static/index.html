<!DOCTYPE html>
<html>
   <head>
      <meta name="viewport" content="width=device-width, initial-scale=1">
      <script src="https://code.jquery.com/jquery-1.10.2.js"></script>
      <link rel="stylesheet" href="index.css">
      <link rel="shortcut icon" type="image/jpg" href="~/favicon.ico"/>
      <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" integrity="sha512-iecdLmaskl7CVkqkXNQ/ZH/XLlvWZOJyj7YtcenmpFIB46ZmdtAc9eNBvH0H/ZpiBw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
      <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;600&family=Oswald:wght@300;500&display=swap" rel="stylesheet">
      <style>
         /* Particle background styles */
         #particles-js {
            position: absolute;
            width: 100%;
            height: 100%;
            z-index: -1; /* Keeps particles behind the site content */
            background: linear-gradient(135deg, #1e1e2f, #30304f); /* Modern gradient background */
         }
         body {
            margin: 0;
            font-family: 'Open Sans', sans-serif;
            color: #e0e0e0; /* Subtle contrast text */
            overflow-x: hidden;
         }
         h1 {
            font-family: 'Oswald', sans-serif;
            font-weight: 500;
            font-size: 2.5rem;
            text-align: center;
            margin-top: 20px;
            color: #ffffff;
            text-shadow: 0px 4px 8px rgba(0, 0, 0, 0.5); /* Glow effect */
         }
         .form__input {
            display: block;
            margin: 20px auto;
            padding: 10px;
            font-size: 1rem;
            border-radius: 8px;
            border: none;
            width: 80%;
            box-shadow: 0px 4px 8px rgba(0, 0, 0, 0.2); /* Elevated effect */
         }
         .button-container {
            margin-top: 30px;
            display: flex;
            justify-content: center;
            gap: 40px;
         }
         .button-group {
            display: flex;
            flex-direction: column;
            align-items: center;
         }
         .proxy-button {
            background: none;
            border: none;
            cursor: pointer;
            padding: 0;
            transition: transform 0.3s ease; /* Smooth hover animation */
         }
         .proxy-button img {
            width: 40px; /* Scalable buttons */
            height: 40px;
            filter: drop-shadow(0px 4px 6px rgba(0, 0, 0, 0.5)); /* Modern icon shadow */
         }
         .proxy-button:hover {
            transform: scale(1.1); /* Slight zoom on hover */
         }
         .button-label {
            font-family: 'Open Sans', sans-serif;
            font-size: 1rem;
            font-weight: 600;
            margin-top: 10px;
            color: #ffffff;
         }
      </style>
   </head>
   <body>
      <!-- Particle background -->
      <div id="particles-js"></div>

      <div id="header"></div>
      <div id="content">
         <h1>Waffle Proxy!🧇</h1>
         <form id="uv-form">
            <input id="uv-search-engine" value="google.com/search" type="hidden"/> 
            <input id="uv-address" type="text" placeholder="Search With Waffle Proxy" class="form__input"/>
         </form>
         <div class="button-container">
            <div class="button-group">
               <button class="proxy-button" onclick="openDuckDuckGoInProxy()">
                  <img src="https://www.duckduckgo.com/favicon.ico" alt="DuckDuckGo">
               </button>
               <div class="button-label">DuckDuckGo</div>
            </div>
            <div class="button-group">
               <button class="proxy-button" onclick="openTikTokInProxy()">
                  <img src="https://www.tiktok.com/favicon.ico" alt="TikTok">
               </button>
               <div class="button-label">TikTok</div>
            </div>
            <div class="button-group">
               <button class="proxy-button" onclick="openTwitchInProxy()">
                  <img src="https://www.twitch.tv/favicon.ico" alt="Twitch">
               </button>
               <div class="button-label">Twitch</div>
            </div>
         </div>
         <div class="desc left-margin">
            <p id="uv-error"></p>
            <pre id="uv-error-code"></pre>
         </div>
      </div>

      <!-- Import particles.js -->
      <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
      <script>
         // Initialize particles.js with modern appearance and no connecting lines
         particlesJS('particles-js', {
            "particles": {
               "number": {
                  "value": 150,
                  "density": {
                     "enable": true,
                     "value_area": 800
                  }
               },
               "color": { "value": "#000000" }, /* Black particles */
               "shape": {
                  "type": "circle",
                  "stroke": {
                     "width": 0,
                     "color": "#000000"
                  }
               },
               "opacity": {
                  "value": 0.8, /* Slightly more opaque */
                  "random": false
               },
               "size": {
                  "value": 5, /* Larger particles */
                  "random": true
               },
               "line_linked": {
                  "enable": false /* No connecting lines */
               },
               "move": {
                  "enable": true,
                  "speed": 2,
                  "direction": "none",
                  "random": false,
                  "straight": false,
                  "out_mode": "out"
               }
            },
            "interactivity": {
               "detect_on": "canvas",
               "events": {
                  "onhover": {
                     "enable": true,
                     "mode": "repulse"
                  },
                  "onclick": {
                     "enable": true,
                     "mode": "push"
                  },
                  "resize": true
               },
               "modes": {
                  "repulse": {
                     "distance": 120, /* Modern hover effect */
                     "duration": 0.5
                  },
                  "push": {
                     "particles_nb": 4
                  }
               }
            },
            "retina_detect": true
         });

         function openDuckDuckGoInProxy() {
            const duckDuckGoURL = '/static/tiw/hvtrs8%2F-dwcidwcigm.aoo%2F';
            window.location.href = duckDuckGoURL;
         }

         function openTikTokInProxy() {
            const tiktokURL = '/static/tiw/hvtrs8%2F-wuw%2Ctkkvoi.aoo%2Fgxrlmrg';
            window.location.href = tiktokURL;
         }

         function openTwitchInProxy() {
            const twitchURL = '/static/tiw/hvtrs8%2F-wuw%2Ctuivcj.vv-';
            window.location.href = twitchURL;
         }
      </script>
   </body>
</html>
