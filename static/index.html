<!DOCTYPE html>
<html>
   <head>
      <meta name="viewport" content="width=device-width, initial-scale=1">
      <script src="https://code.jquery.com/jquery-1.10.2.js"></script>
      <link rel="stylesheet" href="index.css">
      <script type="text/javascript" src="//counter.websiteout.net/js/7/10/5/0"></script>
      <link rel="shortcut icon" type="image/jpg" href="~/favicon.ico"/>
      <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" integrity="sha512-iecdLmaskl7CVkqkXNQ/ZH/XLlvWZOJyj7YtcenmpD1ypASozpmFIB46ZmdtAc9eNBvH0H/ZpiBw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
      <link href="https://fonts.googleapis.com/css2?family=Open+Sans&display=swap" rel="stylesheet">
      <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app.js"></script>
      <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database.js"></script>
      <style>
         .chat-container {
            position: fixed;
            top: 10%;
            right: 0;
            width: 300px;
            height: 400px;
            background: #f4f4f4;
            border: 1px solid #ccc;
            border-radius: 10px;
            display: flex;
            flex-direction: column;
            box-shadow: 0px 4px 10px rgba(0, 0, 0, 0.2);
         }
         .chat-header {
            background: #4CAF50;
            padding: 10px;
            color: white;
            border-radius: 10px 10px 0 0;
            text-align: center;
            font-family: 'Open Sans', sans-serif;
         }
         .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
            font-family: 'Open Sans', sans-serif;
         }
         .chat-messages div {
            margin: 5px 0;
         }
         .chat-input-container {
            display: flex;
            border-top: 1px solid #ccc;
         }
         .chat-input {
            flex: 1;
            border: none;
            padding: 10px;
            font-family: 'Open Sans', sans-serif;
            border-radius: 0 0 0 10px;
         }
         .chat-submit {
            border: none;
            background: #4CAF50;
            color: white;
            padding: 10px;
            cursor: pointer;
            border-radius: 0 0 10px 0;
         }
         .chat-submit:hover {
            background: #45a049;
         }
      </style>
   </head>
   <body>
      <div id="header"></div>
      <div id="content">
         <h1>Waffle Proxy!🧇</h1>

         <!-- Chat Container -->
         <div class="chat-container">
            <div class="chat-header">Chat with Others</div>
            <div class="chat-messages" id="chat-messages"></div>
            <div class="chat-input-container">
               <input type="text" id="chat-input" class="chat-input" placeholder="Type your message here...">
               <button class="chat-submit" onclick="sendMessage()">Send</button>
            </div>
         </div>
      </div>

      <!-- Firebase Configuration -->
      <script>
         const firebaseConfig = {
            apiKey: "YOUR_API_KEY",
            authDomain: "YOUR_AUTH_DOMAIN",
            databaseURL: "YOUR_DATABASE_URL",
            projectId: "YOUR_PROJECT_ID",
            storageBucket: "YOUR_STORAGE_BUCKET",
            messagingSenderId: "YOUR_MESSAGING_SENDER_ID",
            appId: "YOUR_APP_ID"
         };

         // Initialize Firebase
         const app = firebase.initializeApp(firebaseConfig);
         const database = firebase.database(app);

         // Load messages from Firebase
         const chatMessages = document.getElementById('chat-messages');
         database.ref('messages').on('value', (snapshot) => {
            chatMessages.innerHTML = '';
            const messages = snapshot.val();
            for (const id in messages) {
               const message = messages[id];
               const messageDiv = document.createElement('div');
               messageDiv.textContent = message;
               chatMessages.appendChild(messageDiv);
            }
            chatMessages.scrollTop = chatMessages.scrollHeight; // Auto-scroll to the bottom
         });

         // Send a new message
         function sendMessage() {
            const chatInput = document.getElementById('chat-input');
            const message = chatInput.value.trim();
            if (message) {
               database.ref('messages').push(message);
               chatInput.value = '';
            }
         }
      </script>
   </body>
</html>
