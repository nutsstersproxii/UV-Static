<!DOCTYPE html>
<html>
   <head>
      <meta name="viewport" content="width=device-width, initial-scale=1">
      <title>Waffle Proxy - Search Engine Selector</title>
      <script src="https://code.jquery.com/jquery-1.10.2.js"></script>
      <link rel="stylesheet" href="index.css">
      <style>
         #search-engine-selector {
            margin-top: 10px;
         }
         label {
            font-size: 14px;
            font-weight: bold;
            margin-right: 10px;
         }
         select {
            padding: 5px;
            font-size: 14px;
         }
      </style>
   </head>
   <body>
      <div id="content">
         <h1>Waffle Proxy! 🧇</h1>

         <form id="uv-form">
            <input id="uv-address" type="text" placeholder="Search With Waffle Proxy" class="form__input"/>
            <div id="search-engine-selector">
               <label for="search-engine">Choose your search engine:</label>
               <select id="search-engine">
                  <option value="https://www.google.com/search?q=" selected>Google</option>
                  <option value="https://www.bing.com/search?q=">Microsoft Bing</option>
                  <option value="https://duckduckgo.com/?q=">DuckDuckGo</option>
               </select>
            </div>
            <button type="submit">Search</button>
         </form>
      </div>

      <script>
         document.getElementById('uv-form').addEventListener('submit', function(event) {
            event.preventDefault();

            const searchInput = document.getElementById('uv-address').value.trim();
            const selectedSearchEngine = document.getElementById('search-engine').value;

            const proxyBase = "/static/tiw/"; // Adjust this as per your proxy’s requirement
            let encodedURL;

            if (isValidURL(searchInput)) {
               // If it's a valid URL, encode it for the proxy
               encodedURL = encodeURIComponent(searchInput); // Adjust the encoding method if required
            } else {
               // If it's a search term, create the search URL and encode it for the proxy
               const searchQuery = encodeURIComponent(searchInput);
               const searchEngineURL = `${selectedSearchEngine}${searchQuery}`;
               encodedURL = encodeURIComponent(searchEngineURL); // Encode the entire URL for the proxy
            }

            // Redirect to the encoded URL via the proxy
            window.location.href = `${proxyBase}${encodedURL}`;
         });

         function isValidURL(string) {
            try {
               const url = new URL(string);
               return url.protocol === "http:" || url.protocol === "https:";
            } catch (_) {
               return false;
            }
         }
      </script>
   </body>
</html>
