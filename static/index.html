<!DOCTYPE html>
<html>
   <head>
      <meta name="viewport" content="width=device-width, initial-scale=1">
      <title>Waffle Proxy</title>
      <style>
         /* Basic styling for body */
         body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f5f5f5;
         }

         /* Content styling */
         #content {
            text-align: center;
            margin: 50px auto;
            padding: 20px;
            background: #fff;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            width: 80%;
            max-width: 600px;
         }

         /* Headline */
         #content h1 {
            font-size: 28px;
            color: #333;
            margin-bottom: 20px;
         }

         /* Search form styling */
         #uv-form {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
         }

         /* Search input styling */
         .form__input {
            padding: 10px 15px;
            border: 2px solid #ddd;
            border-radius: 5px;
            font-size: 16px;
            width: 300px;
            transition: all 0.3s ease;
         }

         /* Hover effect for input */
         .form__input:hover {
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            border-color: #aaa;
         }

         /* Search button styling */
         #uv-form button {
            padding: 10px 20px;
            font-size: 16px;
            font-weight: bold;
            color: #fff;
            background: linear-gradient(45deg, #6a5acd, #8a2be2);
            border: none;
            border-radius: 5px;
            cursor: pointer;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
            transition: all 0.3s ease;
         }

         /* Search button hover effect */
         #uv-form button:hover {
            background: linear-gradient(45deg, #8a2be2, #6a5acd);
            transform: scale(1.1);
            box-shadow: 0 6px 12px rgba(0, 0, 0, 0.3);
         }

         /* Styling for hover effects on links (placeholder for other elements) */
         a {
            text-decoration: none;
            color: #333;
            transition: color 0.3s ease, box-shadow 0.3s ease;
         }

         a:hover {
            color: #8a2be2;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.2);
         }
      </style>
   </head>
   <body>
      <div id="content">
         <h1>Waffle Proxy! 🧇</h1>

         <form id="uv-form">
            <input id="uv-address" type="text" placeholder="Search With Waffle Proxy" class="form__input" />
            <button type="submit">Search</button>
         </form>

         <p>Hover over elements to see the magic!</p>
      </div>

      <script>
         document.getElementById('uv-form').addEventListener('submit', function (event) {
            event.preventDefault(); // Prevent default form submission behavior

            const searchInput = document.getElementById('uv-address').value.trim();
            const searchEngine = "https://www.duckduckgo.com/";

            if (isValidURL(searchInput)) {
               // If the input is a valid URL, navigate to it directly
               window.location.href = searchInput;
            } else {
               // If the input isn't a URL, perform a DuckDuckGo search through the proxy
               const searchQuery = encodeURIComponent(searchInput); // Encode query to ensure it works in a URL
               window.location.href = `${searchEngine}?q=${searchQuery}`;
            }
         });

         // Helper function to check if a string is a valid URL
         function isValidURL(string) {
            try {
               const url = new URL(string);
               return url.protocol === "http:" || url.protocol === "https:";
            } catch (_) {
               return false;
            }
         }
      </script>
   </body>
</html>
