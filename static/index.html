<!DOCTYPE html>
<html>
   <head>
      <meta name="viewport" content="width=device-width, initial-scale=1">
      <script src="https://code.jquery.com/jquery-1.10.2.js"></script>
      <link rel="stylesheet" href="index.css">
      <link rel="shortcut icon" type="image/jpg" href="~/favicon.ico"/>
      <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" integrity="sha512-iecdLmaskl7CVkqkXNQ/ZH/XLlvWZOJyj7YtcenmpD1ypASozpmFIB46ZmdtAc9eNBvH0H/ZpiBw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
      <link href="https://fonts.googleapis.com/css2?family=Open+Sans&display=swap" rel="stylesheet">
      <link href="https://fonts.googleapis.com/css2?family=Oswald&display=swap" rel="stylesheet">
      <style>
         /* Particle background styles */
         #particles-js {
            position: absolute;
            width: 100%;
            height: 100%;
            z-index: -1; /* Keeps particles behind the site content */
         }
         body {
            margin: 0;
            font-family: 'Open Sans', sans-serif;
            overflow-x: hidden;
         }
         .button-container {
            margin-top: 20px;
            display: flex;
            justify-content: center;
            gap: 20px;
         }
         .button-group {
            display: flex;
            flex-direction: column;
            align-items: center;
         }
         .proxy-button {
            background: none;
            border: none;
            cursor: pointer;
            padding: 0;
         }
         .proxy-button img {
            width: 30px;
            height: 30px;
         }
         .button-label {
            font-family: 'Open Sans', sans-serif;
            font-size: 12px;
            margin-top: 5px;
            text-align: center;
         }
      </style>
   </head>
   <body>
      <!-- Particle background -->
      <div id="particles-js"></div>

      <div id="header"></div>
      <div id="content">
         <h1>Waffle Proxy!🧇</h1>
         <form id="uv-form">
            <input id="uv-search-engine" value="google.com/search" type="hidden"/> 
            <input id="uv-address" type="text" placeholder="Search With Waffle Proxy" class="form__input"/>
         </form>
         <div class="button-container">
            <div class="button-group">
               <button class="proxy-button" onclick="openDuckDuckGoInProxy()">
                  <img src="https://www.duckduckgo.com/favicon.ico" alt="DuckDuckGo">
               </button>
               <div class="button-label">DuckDuckGo</div>
            </div>
            <div class="button-group">
               <button class="proxy-button" onclick="openTikTokInProxy()">
                  <img src="https://www.tiktok.com/favicon.ico" alt="TikTok">
               </button>
               <div class="button-label">TikTok</div>
            </div>
            <div class="button-group">
               <button class="proxy-button" onclick="openTwitchInProxy()">
                  <img src="https://www.twitch.tv/favicon.ico" alt="Twitch">
               </button>
               <div class="button-label">Twitch</div>
            </div>
         </div>
         <div class="desc left-margin">
            <p id="uv-error"></p>
            <pre id="uv-error-code"></pre>
         </div>
      </div>

      <!-- Import particles.js -->
      <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
      <script>
         // Initialize particles.js with more visible particles and connecting lines
         particlesJS('particles-js', {
            "particles": {
               "number": {
                  "value": 150, /* Increase number for more particles */
                  "density": {
                     "enable": true,
                     "value_area": 800
                  }
               },
               "color": { "value": "#ffffff" }, /* Particle color */
               "shape": {
                  "type": "circle",
                  "stroke": {
                     "width": 0,
                     "color": "#000000"
                  }
               },
               "opacity": {
                  "value": 0.7, /* Increase visibility */
                  "random": false,
                  "anim": {
                     "enable": false,
                     "speed": 1,
                     "opacity_min": 0.1,
                     "sync": false
                  }
               },
               "size": {
                  "value": 4, /* Larger particles */
                  "random": true
               },
               "line_linked": {
                  "enable": true, /* Enable connecting lines */
                  "distance": 150,
                  "color": "#ffffff",
                  "opacity": 0.6,
                  "width": 1
               },
               "move": {
                  "enable": true,
                  "speed": 2,
                  "direction": "none",
                  "random": false,
                  "straight": false,
                  "out_mode": "out"
               }
            },
            "interactivity": {
               "detect_on": "canvas",
               "events": {
                  "onhover": {
                     "enable": true,
                     "mode": "repulse"
                  },
                  "onclick": {
                     "enable": true,
                     "mode": "push"
                  },
                  "resize": true
               },
               "modes": {
                  "repulse": {
                     "distance": 100,
                     "duration": 0.4
                  },
                  "push": {
                     "particles_nb": 4
                  }
               }
            },
            "retina_detect": true
         });

         function openDuckDuckGoInProxy() {
            const duckDuckGoURL = '/static/tiw/hvtrs8%2F-dwcidwcigm.aoo%2F';
            window.location.href = duckDuckGoURL;
         }

         function openTikTokInProxy() {
            const tiktokURL = '/static/tiw/hvtrs8%2F-wuw%2Ctkkvoi.aoo%2Fgxrlmrg';
            window.location.href = tiktokURL;
         }

         function openTwitchInProxy() {
            const twitchURL = '/static/tiw/hvtrs8%2F-wuw%2Ctuivcj.vv-';
            window.location.href = twitchURL;
         }
      </script>
   </body>
</html>
